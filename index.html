<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>8 Months ❤️</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#0d0d0d;
overflow:hidden;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
color:white;
}

.container{
text-align:center;
z-index:2;
}

h1{
font-size:45px;
margin-bottom:20px;
animation:glow 2s infinite alternate;
}

p{
font-size:20px;
margin-bottom:25px;
color:#ddd;
}

button{
padding:15px 40px;
font-size:20px;
border:none;
border-radius:50px;
background:#ff4d6d;
color:white;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:scale(1.1);
background:#ff1744;
}

.heart{
position:absolute;
bottom:-20px;
font-size:20px;
animation:float 8s linear infinite;
opacity:.7;
}

@keyframes float{
0%{
transform:translateY(0) rotate(0deg);
opacity:0;
}
30%{
opacity:1;
}
100%{
transform:translateY(-110vh) rotate(360deg);
opacity:0;
}
}

@keyframes glow{
from{
text-shadow:0 0 10px hotpink;
}
to{
text-shadow:0 0 30px red;
}
}
</style>

</head>

<body>

<div class="container">

<h1>❤️ Happy 8 Months ❤️</h1>

<p>A little surprise is waiting for you...</p>

<button onclick="alert('Part 2 Coming ❤️')">
Open Surprise
</button>

</div>

<script>

function heart(){

let h=document.createElement("div");

h.className="heart";

h.innerHTML="❤️";

h.style.left=Math.random()*100+"vw";

h.style.fontSize=(20+Math.random()*30)+"px";

h.style.animationDuration=(5+Math.random()*5)+"s";

document.body.appendChild(h);

setTimeout(()=>{

h.remove();

},9000);

}

setInterval(heart,250);

</script>

</body>
</html>
